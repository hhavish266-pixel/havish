<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Google Drive Media</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      text-align: center;
      padding: 20px;
    }

    h1 {
      color: #333;
    }

    img {
      width: 400px;
      border-radius: 10px;
      margin-bottom: 30px;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
    }

    iframe {
      width: 700px;
      height: 400px;
      border: none;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
    }
  </style>
</head>
<body>

  <h1>Google Drive Image</h1>

  <!-- Fixed Image Link -->
  <img 
    src="https://drive.google.com/thumbnail?id=12acjBm4oI2JhM3w2MkBp5cl7OLr9vUaG&sz=w1000" 
    alt="Drive Image">

  <h1>Google Drive Video</h1>

  <!-- Fixed Video Link -->
  <iframe 
    src="https://drive.google.com/file/d/1EtuV9jVa775K9yc2zseUWhRFzWORGk3D/preview"
    allow="autoplay">
  </iframe>

</body>
</html>
